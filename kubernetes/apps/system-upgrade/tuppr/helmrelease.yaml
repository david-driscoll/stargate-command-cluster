---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: tuppr
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.4.0
    digest: sha256:388596c303bddb754f55092d18c704fddf95b29874da5a8ed9564af5fba1827e
  url: oci://ghcr.io/home-operations/charts/tuppr
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tuppr
spec:
  chartRef:
    kind: OCIRepository
    name: tuppr
  interval: 1h
  values:
    replicaCount: 1
    monitoring:
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
    webhook:
      enabled: true
