[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/scripts"
TALOS_DIR = "{{config_root}}/talos"
CONNECT_HOST = "https://op-connect.equestria.driscoll.tech/"
CONNECT_VAULT = "Eris"
CONNECT_TOKEN = "op://Eris/OnePassword Connect Token/credential"

[tools]
python = "3.13.1"
"pipx:makejinja" = "2.8.1"
krew = "0.4.5"

kubectl = "1.34.2"
powershell-core = "7.5.1"
1password-cli = "2.30.3"
talos = "1.10.4"
talhelper = "3.0.39"
yq = "4.48.2"
jq = "1.8.1"
helm = "3.19.2"
helmfile = "1.1.9"
kubeconform = "0.7.0"
kustomize = "5.8.0"
task = "3.44.0"
sops = "3.11.0"
flux2 = "2.7.3"
age = "1.2.1"
cilium-cli = "0.18.4"
cloudflared = "2025.6.1"
cue = "0.13.2"
gh = "2.74.2"
"aqua:brumhard/krewfile" = "0.6.3"
"pipx:flux-local" = "latest"

[tasks.update]
description = 'Update all apps that have an update script'
run = [
  'dotnet run .mise/tasks/do-update.cs',
  'flux-local test --enable-helm --all-namespaces --sources "flux-system" --path ./kubernetes/flux/cluster/ --verbosity 2',
]
