apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-broad-secrets
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-broad-secrets-binding
subjects:
- kind: ServiceAccount
  name: postgres
  namespace: database
roleRef:
  kind: Role
  name: postgres-broad-secrets
  apiGroup: rbac.authorization.k8s.io
