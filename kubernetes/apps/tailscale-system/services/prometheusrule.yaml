# Generated by Update.cs — do not edit manually
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blackbox-probe-alerts
spec:
  groups:
    - name: blackbox_probes
      interval: 30s
      rules:
        - record: blackbox:probe:success:rate5m
          expr: |
            avg by (probe) (rate(probe_success[5m]))
        - alert: BlackboxProbeFailing
          annotations:
            description: "Blackbox probe '{{ $labels.probe }}' has been failing."
            summary: "Blackbox probe failing"
          expr: |
            avg_over_time(probe_success[5m]) < 0.9
          for: 5m
          labels:
            severity: warning
        - alert: BlackboxProbeFailingCritical
          annotations:
            description: "Blackbox probe '{{ $labels.probe }}' is critically failing."
            summary: "Blackbox probe critically failing"
          expr: |
            avg_over_time(probe_success[5m]) < 0.5
          for: 2m
          labels:
            severity: critical
        - alert: BlackboxProbeHighLatency
          annotations:
            description: "Blackbox probe '{{ $labels.probe }}' p99 latency is {{ $value | humanizeDuration }}."
            summary: "Blackbox probe high latency"
          expr: |
            histogram_quantile(0.99, sum by (probe, le) (rate(probe_duration_seconds_bucket[5m]))) > 10
          for: 10m
          labels:
            severity: warning
        - alert: BlackboxProbeSslCertificateExpiringSoon
          annotations:
            description: "SSL certificate for probe '{{ $labels.probe }}' expires in {{ $value | humanizeDuration }}."
            summary: "SSL certificate expiring soon"
          expr: |
            probe_ssl_earliest_cert_expiry - time() < 86400 * 7
          for: 1h
          labels:
            severity: warning
        - alert: BlackboxProbeTimeout
          annotations:
            description: "Blackbox probe '{{ $labels.probe }}' is timing out."
            summary: "Blackbox probe timeout"
          expr: |
            probe_success == 0 and probe_duration_seconds > 9
          for: 2m
          labels:
            severity: warning