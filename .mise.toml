[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/scripts"
TALOS_DIR = "{{config_root}}/talos"
CONNECT_HOST = "https://op-connect.equestria.driscoll.tech/"
CONNECT_VAULT = "Eris"
CONNECT_TOKEN = "op://Eris/Eris 1Password Connect Access Token/credential"
TAILSCALE_CLIENT_ID = "op://Eris/Tailscale Terraform OAuth Client/username"
TAILSCALE_CLIENT_SECRET = "op://Eris/Tailscale Terraform OAuth Client/credential"
UNIFI_HOST = "unifi.driscoll.tech"
UNIFI_USERNAME = "op://Eris/unifipoller/username"
UNIFI_PASSWORD = "op://Eris/unifipoller/password"
UNIFI_API_KEY = "op://Eris/Unifi Api Key Eris Cluster/credential"
UNIFI_PORT = "443"
UNIFI_SITE = "default"
UNIFI_VERIFY_SSL = "false"
UNIFI_TOOL_REGISTRATION_MODE = "lazy"

[tools]
python = "3.14.6"
"pipx:makejinja" = "2.8.2"
krew = "0.5.0"

kubectl = "1.36.2"
powershell-core = "7.6.3"
1password-cli = "2.34.1"
talos = "1.13.5"
talosctl = "1.13.5"
talhelper = "3.1.12"
yq = "4.53.3"
jq = "1.8.2"
helm = "4.2.3"
helmfile = "1.7.0"
kubeconform = "0.8.0"
kustomize = "5.8.1"
task = "3.52.0"
sops = "3.13.2"
flux2 = "2.9.0"
age = "1.3.1"
cilium-cli = "0.19.5"
cloudflared = "2026.6.1"
cue = "0.17.0"
gh = "2.96.0"
"aqua:brumhard/krewfile" = "0.7.0"
"github:home-operations/flate" = "v0.4.10"
"github:microsoft/apm" = { version = "v0.24.0", bin = "apm" }
"github:eljulians/skillfile" = { version = "v1.7.1", bin = "skillfile" }
dotnet = { version = "10.0.203" }

[tasks.update]
description = 'Update all apps that have an update script'
run = [
  'dotnet run .mise/tasks/do-update.cs',
  'mise task flate',
]

[tasks.flate]
description = 'Run flate'
run = [
  'flate test all --allow-missing-secrets --source-retry-attempts 10',
]
