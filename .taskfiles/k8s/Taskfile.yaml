---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  cleanup-pods:
    desc: Clean up pods with a Failed/Pending/Succeeded phase
    preconditions:
      - which kubectl
    cmds:
      - for:
          matrix:
            PHASE:
              - Failed
              - Succeeded
        cmd: kubectl delete pods --field-selector status.phase={{.ITEM.PHASE}} -A --ignore-not-found=true
  cleanup-resource:
    desc: Clean up a given resource by kind and name
    requires:
      vars: [NAME, NAMESPACE]
    ignore_error: true
    preconditions:
      - which kubectl
    cmds:
      - |
        # Get all namespace-scoped resource types (as singular names, e.g., "configmap" instead of "configmaps")
        RESOURCE_TYPES=$(kubectl api-resources -o name)

        # For each resource type, get resources in the target namespace
        for resource in $RESOURCE_TYPES; do
          echo -e "\n--- Resource: $resource ---"
          kubectl get "$resource" -l app.kubernetes.io/name={{.NAME}} -n "{{.NAMESPACE}}" -o name 2>/dev/null | xargs -I {} kubectl patch {} -p '{"metadata":{"finalizers":[]}}' --type=merge -n {{.NAMESPACE}} 2>/dev/null || true
          kubectl delete "$resource" -l app.kubernetes.io/name={{.NAME}} -n "{{.NAMESPACE}}" --ignore-not-found=true || true
        done

        # Clean up Flux/Helm release secrets (sh.helm.release.v1.${app}.*)
        echo -e "\n--- Resource: Helm Release Secrets ---"
        kubectl get secret -n "{{.NAMESPACE}}" 2>/dev/null | grep "sh.helm.release.v1.{{.NAME}}" | awk '{print $1}' | while read -r secret_name; do
          if [ -n "$secret_name" ]; then
            kubectl patch secret "$secret_name" -p '{"metadata":{"finalizers":[]}}' --type=merge -n {{.NAMESPACE}} 2>/dev/null || true
            kubectl delete secret "$secret_name" -n {{.NAMESPACE}} 2>/dev/null || true
          fi
        done
  restart-flux:
    cmd: kubectl rollout restart deployment,statefulset,daemonset -n flux-system
  restart-kube:
    cmd: kubectl rollout restart deployment,statefulset,daemonset -n kube-system
