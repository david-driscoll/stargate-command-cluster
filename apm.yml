name: equestria-cluster
version: 1.0.0
description: APM project for equestria-cluster
author: David Driscoll
targets:
- claude
- copilot
dependencies:
  apm:
  - ionfury/homelab/.claude/skills/app-template
  - ionfury/homelab/.claude/skills/architecture-review
  - ionfury/homelab/.claude/skills/cnpg-database
  - ionfury/homelab/.claude/skills/deploy-app
  - ionfury/homelab/.claude/skills/flux-gitops
  - ionfury/homelab/.claude/skills/gateway-routing
  - ionfury/homelab/.claude/skills/gha-pipelines
  - ionfury/homelab/.claude/skills/grafana-dashboards
  - ionfury/homelab/.claude/skills/instruction-eval
  - ionfury/homelab/.claude/skills/k8s
  - ionfury/homelab/.claude/skills/kubesearch
  - ionfury/homelab/.claude/skills/loki
  - ionfury/homelab/.claude/skills/monitoring-authoring
  - ionfury/homelab/.claude/skills/network-policy
  - ionfury/homelab/.claude/skills/opentofu-modules
  - ionfury/homelab/.claude/skills/prometheus
  - ionfury/homelab/.claude/skills/promotion-pipeline
  - ionfury/homelab/.claude/skills/secrets
  - ionfury/homelab/.claude/skills/security-testing
  - ionfury/homelab/.claude/skills/self-improvement
  - ionfury/homelab/.claude/skills/sre
  - ionfury/homelab/.claude/skills/sync-claude
  - ionfury/homelab/.claude/skills/taskfiles
  - ionfury/homelab/.claude/skills/terragrunt
  - ionfury/homelab/.claude/skills/versions-renovate
  - sirkirby/unifi-mcp/plugins/unifi-network
  - sirkirby/unifi-mcp/plugins/unifi-protect
  - sirkirby/unifi-mcp/plugins/unifi-access
  - cloudflare/skills
  mcp:
  - name: kubernetes
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - kubernetes-mcp-server
  - name: pulumi
    registry: false
    transport: stdio
    command: npx
    args:
    - -y
    - '@pulumi/mcp-server'
    - stdio
  - name: mise
    registry: false
    transport: stdio
    command: mise
    env:
      MISE_EXPERIMENTAL: '1'
    args:
    - mcp
  - name: cloudflare-api
    registry: false
    transport: http
    url: https://mcp.cloudflare.com/mcp
  - name: cloudflare-docs
    registry: false
    transport: http
    url: https://docs.mcp.cloudflare.com/mcp
  - name: cloudflare-bindings
    registry: false
    transport: http
    url: https://bindings.mcp.cloudflare.com/mcp
  - name: cloudflare-builds
    registry: false
    transport: http
    url: https://builds.mcp.cloudflare.com/mcp
  - name: cloudflare-observability
    registry: false
    transport: http
    url: https://observability.mcp.cloudflare.com/mcp
  - name: unifi-access
    registry: false
    transport: stdio
    command: op
    env:
      UNIFI_HOST: "${UNIFI_HOST:-}"
      UNIFI_USERNAME: "${UNIFI_USERNAME:-}"
      UNIFI_PASSWORD: "${UNIFI_PASSWORD:-}"
      UNIFI_PORT: "${UNIFI_PORT:-443}"
      UNIFI_VERIFY_SSL: "${UNIFI_VERIFY_SSL:-false}"
      UNIFI_ACCESS_HOST: "${UNIFI_HOST:-}"
      UNIFI_ACCESS_USERNAME: "${UNIFI_USERNAME:-}"
      UNIFI_ACCESS_PASSWORD: "${UNIFI_PASSWORD:-}"
      UNIFI_ACCESS_API_KEY: "${UNIFI_API_KEY:-}"
      UNIFI_ACCESS_PORT: "${UNIFI_PORT:-443}"
      UNIFI_ACCESS_API_PORT: "${UNIFI_API_PORT:-12445}"
      UNIFI_ACCESS_VERIFY_SSL: "${UNIFI_VERIFY_SSL:-false}"
      UNIFI_TOOL_REGISTRATION_MODE: "${UNIFI_TOOL_REGISTRATION_MODE:-lazy}"
    args:
      - run
      - --no-masking
      - --
      - uvx
      - "--python-preference"
      - "system"
      - "unifi-access-mcp==0.3.1"
  - name: unifi-network
    registry: false
    transport: stdio
    command: op
    env:
      UNIFI_HOST: "${UNIFI_HOST:-}"
      UNIFI_USERNAME: "${UNIFI_USERNAME:-}"
      UNIFI_PASSWORD: "${UNIFI_PASSWORD:-}"
      UNIFI_PORT: "${UNIFI_PORT:-443}"
      UNIFI_SITE: "${UNIFI_SITE:-default}"
      UNIFI_VERIFY_SSL: "${UNIFI_VERIFY_SSL:-false}"
      UNIFI_NETWORK_HOST: "${UNIFI_HOST:-}"
      UNIFI_NETWORK_USERNAME: "${UNIFI_USERNAME:-}"
      UNIFI_NETWORK_PASSWORD: "${UNIFI_PASSWORD:-}"
      UNIFI_NETWORK_PORT: "${UNIFI_PORT:-443}"
      UNIFI_NETWORK_SITE: "${UNIFI_SITE:-default}"
      UNIFI_NETWORK_VERIFY_SSL: "${UNIFI_VERIFY_SSL:-false}"
      UNIFI_TOOL_REGISTRATION_MODE: "${UNIFI_TOOL_REGISTRATION_MODE:-lazy}"
    args:
      - run
      - --no-masking
      - --
      - uvx
      - "--python-preference"
      - "system"
      - "unifi-network-mcp==0.18.2"
  - name: unifi-protect
    registry: false
    transport: stdio
    command: op
    env:
      UNIFI_HOST: "${UNIFI_HOST:-}"
      UNIFI_USERNAME: "${UNIFI_USERNAME:-}"
      UNIFI_PASSWORD: "${UNIFI_PASSWORD:-}"
      UNIFI_PORT: "${UNIFI_PORT:-443}"
      UNIFI_VERIFY_SSL: "${UNIFI_VERIFY_SSL:-false}"
      UNIFI_PROTECT_HOST: "${UNIFI_HOST:-}"
      UNIFI_PROTECT_USERNAME: "${UNIFI_USERNAME:-}"
      UNIFI_PROTECT_PASSWORD: "${UNIFI_PASSWORD:-}"
      UNIFI_PROTECT_PORT: "${UNIFI_PORT:-443}"
      UNIFI_PROTECT_VERIFY_SSL: "${UNIFI_VERIFY_SSL:-false}"
      UNIFI_TOOL_REGISTRATION_MODE: "${UNIFI_TOOL_REGISTRATION_MODE:-lazy}"
    args:
      - run
      - --no-masking
      - --
      - uvx
      - "--python-preference"
      - "system"
      - "unifi-protect-mcp==0.4.2"
includes: auto
scripts: {}
