---
# ClusterRole for devices impersonated as tailnet-cluster-ops (cluster connector tags via kubeproxy auth mode).
# Mirrors definition-crds permissions with additional notification.toolkit.fluxcd.io read access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tailnet-cluster-ops
rules:
  - apiGroups: ["driscoll.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autokuma.bigboot.dev"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["notification.toolkit.fluxcd.io"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch", "patch", "update", "create", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tailnet-cluster-ops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tailnet-cluster-ops
subjects:
  - kind: Group
    name: tailnet-cluster-ops
    apiGroup: rbac.authorization.k8s.io
