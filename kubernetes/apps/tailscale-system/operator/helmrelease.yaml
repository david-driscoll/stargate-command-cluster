---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app tailscale-operator
spec:
  chart:
    spec:
      chart: tailscale-operator
      version: 1.98.9
      sourceRef:
        kind: HelmRepository
        name: tailscale
        namespace: flux-system
  maxHistory: 3
  interval: 1h
  timeout: 10m
  install:
    createNamespace: true
    replace: true
    remediation:
      retries: 7
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 7
      strategy: rollback
  rollback:
    force: false
    cleanupOnFail: true
    recreate: true
  uninstall:
    keepHistory: false
  dependsOn:
    - name: onepassword-connect
      namespace: kube-system
    - name: external-secrets
      namespace: kube-system
  valuesFrom:
    - kind: Secret
      name: tailscale-oauth
      targetPath: oauth.clientId
      valuesKey: username
    - kind: Secret
      name: tailscale-oauth
      targetPath: oauth.clientSecret
      valuesKey: credential
  values:
    fullnameOverride: *app
    installCRDs: true
    operatorConfig:
      logging: debug
      defaultTags:
        - "tag:operator"
      image:
        repository: ghcr.io/tailscale/k8s-operator
        tag: v1.98.9@sha256:8b2f914d0cc947c38853c16c212c8a10e0294292b23950a65dfca4d319eb12ce
        pullPolicy: IfNotPresent
      hostname: "${CLUSTER_CNAME}-operator"
      defaultProxyClass: default
      podAnnotations:
        reloader.stakater.com/auto: "true"
    proxyConfig:
      image:
        repository: tailscale/tailscale
        tag: v1.98.9@sha256:f15d5d3f4a68773a853180b72496f70ba614b64de0878c43fe3da39fe0afba47
      defaultTags: "tag:apps"
      podAnnotations:
        reloader.stakater.com/auto: "true"
      firewallMode: auto
    apiServerProxyConfig:
      allowImpersonation: true
      mode: "true" # "true", "false", "noauth"
