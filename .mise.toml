[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
BOOTSTRAP_DIR = "{{config_root}}/bootstrap"
KUBERNETES_DIR = "{{config_root}}/kubernetes"
ROOT_DIR = "{{config_root}}"
SCRIPTS_DIR = "{{config_root}}/scripts"
TALOS_DIR = "{{config_root}}/talos"
CONNECT_HOST = "https://op-connect.equestria.driscoll.tech/"
CONNECT_VAULT = "Eris"
CONNECT_TOKEN = "op://Eris/Eris 1Password Connect Access Token/credential"

[tools]
python = "3.14.4"
"pipx:makejinja" = "2.8.2"
krew = "0.5.0"

kubectl = "1.36.0"
powershell-core = "7.6.1"
"aqua:1password/cli" = "2.30.3"
talos = "1.12.5"
talosctl = "1.13.0"
talhelper = "3.1.9"
yq = "4.53.2"
jq = "1.8.1"
helm = "4.1.4"
helmfile = "1.4.4"
kubeconform = "0.7.0"
kustomize = "5.8.1"
task = "3.50.0"
sops = "3.12.2"
flux2 = "2.8.6"
age = "1.3.1"
cilium-cli = "0.19.2"
cloudflared = "2025.11.1"
cue = "0.13.2"
gh = "2.92.0"
"aqua:brumhard/krewfile" = "0.7.0"
"pipx:flux-local" = "8.2.0"
"github:eljulians/skillfile" = { version = "v1.5.0", bin = "skillfile" }
dotnet = { postinstall = "dotnet tool restore && dotnet restore", version = "10.0.203" }

[tasks.update]
description = 'Update all apps that have an update script'
run = [
  'dotnet run .mise/tasks/do-update.cs',
  'flux-local test --enable-helm --all-namespaces --path ./kubernetes/flux/ --verbosity 1',
]
[[hooks.enter]]
script = "dotnet tool restore"
